packages:
  "framer-motion": "For page transitions, modal animations, and chat bubble entry effects"
  "date-fns": "For formatting timestamps into human-readable Brazilian formats"
  "lucide-react": "For UI icons across the application"
  "clsx": "For conditional class merging"
  "tailwind-merge": "For conflict-free tailwind class merging"
  "@hookform/resolvers": "For Zod form validation"
  "react-hook-form": "For robust form state management in React"

images:
  - path: "artifacts/chatwoot-app/public/images/auth-bg.png"
    description: "Abstract, elegant, deep blue and purple gradient mesh background, corporate SaaS aesthetic, very subtle geometric lines"
    aspect_ratio: "16:9"

notes:
  - "The API server might not be fully seeded. The frontend includes a robust fallback mock data layer to ensure all UI features (conversations, contacts, messages) are fully visible and interactive even if the backend returns 404s or connection errors."
  - "Authentication checks are mocked to auto-login for demonstration purposes if the real API fails."
