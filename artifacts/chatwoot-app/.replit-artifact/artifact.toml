kind = "web"
previewPath = "/"
title = "ChatFlow - Sistema de Atendimento"
version = "1.0.0"
id = "artifacts/chatwoot-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20303
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/chatwoot-app run dev"

[services.env]
PORT = "20303"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/chatwoot-app", "run", "build"]
publicDir = "artifacts/chatwoot-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
