services:
  postgres:
    image: postgres:16-alpine
    container_name: chatflow_postgres
    environment:
      POSTGRES_USER: chatflow
      POSTGRES_PASSWORD: chatflow_password
      POSTGRES_DB: chatflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatflow_network

  redis:
    image: redis:7-alpine
    container_name: chatflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatflow_network

  minio:
    image: minio/minio:latest
    container_name: chatflow_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - chatflow_network

  n8n:
    image: n8nio/n8n:stable
    container_name: chatflow_n8n
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: chatflow
      DB_POSTGRESDB_PASSWORD: chatflow_password
      GENERIC_TIMEZONE: America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chatflow_network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  n8n_data:

networks:
  chatflow_network:
    driver: bridge
